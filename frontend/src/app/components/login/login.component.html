<div class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-calama-50 to-white">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
    <!-- Header con logo -->
    <div class="flex justify-center items-center mb-4">
  <div
    class="bg-white rounded-full shadow-lg flex items-center justify-center overflow-hidden"
    style="width:120px;height:120px;">
    <img
      src="assets/logo_calama.png"
      alt="Logo Colegio Calama"
      class="object-contain"
      style="width:85px;height:85px;"
    />
  </div>
</div>
    <!-- Formulario -->
    <div class="p-8">
      <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">Iniciar Sesión</h2>

      <!-- Mensaje de error -->
      <div *ngIf="errorMessage" class="mb-4 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg">
        <div class="flex items-center">
          <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
          </svg>
          {{ errorMessage }}
        </div>
      </div>

      <form (ngSubmit)="onSubmit()">
        <!-- Campo de usuario -->
        <div class="mb-6">
          <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
            Nombre de Usuario
          </label>
          <input
            type="text"
            id="username"
            [(ngModel)]="username"
            name="username"
            placeholder="Ingrese su usuario"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-calama-500 focus:border-transparent transition duration-200"
            required
          />
        </div>

        <!-- Campo de contraseña -->
        <div class="mb-6">
          <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
            Contraseña
          </label>
          <input
            type="password"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Ingrese su contraseña"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-calama-500 focus:border-transparent transition duration-200"
            required
          />
        </div>

        <!-- Botón de envío -->
        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full bg-calama-600 text-white py-3 px-4 rounded-lg font-medium hover:bg-calama-700 focus:outline-none focus:ring-2 focus:ring-calama-500 focus:ring-offset-2 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center"
        >
          <span *ngIf="!isLoading">Iniciar Sesión</span>
          <span *ngIf="isLoading" class="flex items-center">
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Iniciando sesión...
          </span>
        </button>
        <br>
      </form>

      <!-- Información adicional -->
      <div class="mt-6 text-center text-sm text-gray-600">
        <p>¿Problemas para acceder?</p>
        <p class="mt-1">Contacte al administrador del sistema</p>
      </div>
    </div>

    <!-- Footer -->
    <div class="bg-gray-50 px-8 py-4 text-center text-xs text-gray-500">
      © 2025 Colegio Nacional Calama - Sistema Académico
    </div>
    <br>
  </div>
</div>
